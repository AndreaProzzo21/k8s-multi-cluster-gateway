<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8s Gateway – Helm Console</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- js-yaml: usato da showChartValues per colorare il YAML restituito da helm show values -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body class="dashboard-page">

    <!-- ================================================================== -->
    <!-- NAVBAR                                                               -->
    <!-- ================================================================== -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-dharmachakra"></i> HELM APPLICATION CONSOLE
        </div>

        <div class="nav-right-container">
            <div class="status-group">
                <div class="info-badge" style="background-color: white;">
                    <span class="label">CLUSTER</span>
                    <span id="displayCluster" class="value"></span>
                </div>
                <div class="info-badge" style="background-color: white;">
                    <span class="label">PROFILE</span>
                    <span id="displayProfile" class="value"></span>
                </div>
                <div class="helm-nav-item" onclick="window.location.href='dashboard.html'" title="Switch to K8s Console">
                    <div class="helm-icon-wrapper">
                        <i class="fas fa-cubes"></i>
                    </div>
                </div>
            </div>
            <div class="nav-divider"></div>
            <button onclick="logout()" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <!-- ================================================================== -->
    <!-- LAYOUT                                                               -->
    <!-- ================================================================== -->
    <div class="main-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div class="sidebar-section">Applications</div>
            <ul>
                <li id="menu-releases" class="active"
                    onclick="setActive(this); loadReleases()">
                    <i class="fas fa-rocket"></i> Installed Releases
                </li>
            </ul>

            <div class="sidebar-section">Catalog & Deploy</div>
            <ul>
                <li id="menu-search"
                    onclick="setActive(this); showChartSearch()">
                    <i class="fas fa-search"></i> Search Charts
                </li>
                <li id="menu-zip"
                    onclick="setActive(this); showZipUpload()">
                    <i class="fas fa-file-archive"></i> Deploy from ZIP
                </li>
            </ul>

            <div class="sidebar-section">Infrastructure</div>
            <ul>
                <li id="menu-repos"
                    onclick="setActive(this); loadRepositories()">
                    <i class="fas fa-database"></i> Helm Repositories
                </li>
            </ul>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">

            <!-- Controls bar: namespace selector + refresh -->
            <div id="controlsContainer" class="controls">
                <div style="flex-grow: 1;">
                    <label style="font-size: 0.7rem; color: var(--text-muted);
                                  display: block; margin-bottom: 5px; font-weight: 600;">
                        NAMESPACE CONTEXT
                    </label>
                    <!-- Popolato da loadNamespaceList() in helm.js -->
                    <div id="nsContextArea" style="display: flex; gap: 8px; align-items: center;"></div>
                </div>
                <button onclick="refreshCurrentView()" class="btn-action">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>

            <!-- Dynamic content area -->
            <div id="resultArea"></div>

        </main>
    </div>

    <!-- ================================================================== -->
    <!-- SCRIPTS                                                              -->
    <!-- Load order matters:                                                  -->
    <!--   1. api.js      — apiCall, _handleClusterUnreachable, apiAbort...  -->
    <!--   2. ui.js       — renderLoadingOverlay, handleLoadingError,        -->
    <!--                    setActive, showManualInput, renderRestrictedAccess -->
    <!--   3. helm.js     — tutto il business logic Helm                     -->
    <!--   4. bootstrapper inline                                             -->
    <!-- ================================================================== -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/modules/helm.js"></script>

    <script>
    // ------------------------------------------------------------------
    // GUARD: se non c'è JWT in localStorage redirect immediato al login
    // ------------------------------------------------------------------
    if (!localStorage.getItem('k8s_jwt')) {
        window.location.replace('index.html');
    }

    // ------------------------------------------------------------------
    // Stato globale (stesso schema della dashboard K8s)
    // ------------------------------------------------------------------
    document.getElementById('displayCluster').innerText =
        localStorage.getItem('current_cluster') || 'N/A';
    document.getElementById('displayProfile').innerText =
        localStorage.getItem('current_profile') || 'N/A';

    window.currentView      = 'releases';
    window.currentNamespace = localStorage.getItem('last_ns') || 'default';

    // ------------------------------------------------------------------
    // refreshCurrentView — identico pattern della dashboard principale
    // ------------------------------------------------------------------
    function refreshCurrentView() {
        const viewMap = {
            releases : loadReleases,
            search   : showChartSearch,
            zip      : showZipUpload,
            repos    : loadRepositories,
        };
        const fn = viewMap[window.currentView];
        if (fn) fn();
    }

    // ------------------------------------------------------------------
    // updateNamespaceContext — override locale (helm non ha tutte le view
    // namespace-sensitive della dashboard, ma loadReleases lo è)
    // ------------------------------------------------------------------
    function updateNamespaceContext(val) {
        if (!val || val === 'undefined') return;
        window.currentNamespace = val;
        localStorage.setItem('last_ns', val);
        refreshCurrentView();
    }

    // ------------------------------------------------------------------
    // logout — identico alla dashboard principale
    // ------------------------------------------------------------------
    function logout() {
        const loginError = sessionStorage.getItem('login_error');
        localStorage.clear();
        sessionStorage.clear();
        if (loginError) sessionStorage.setItem('login_error', loginError);
        document.cookie.split(';').forEach(c => {
            document.cookie = c.replace(/^ +/, '')
                               .replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/');
        });
        window.location.replace('index.html');
    }

    // ------------------------------------------------------------------
    // setActive — override per helm: nessuna vista nasconde i controls
    // tranne search/zip/repos che rendono il namespace selector inutile
    // ------------------------------------------------------------------
    function setActive(el) {
        document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active'));
        el.classList.add('active');

        const controls = document.getElementById('controlsContainer');
        // Releases ha senso con il namespace; le altre viste no
        const nsRelevant = ['menu-releases'];
        controls.style.display = nsRelevant.includes(el.id) ? 'flex' : 'none';
    }

    // ------------------------------------------------------------------
    // initHelmDashboard
    // ------------------------------------------------------------------
    async function initHelmDashboard() {
        renderLoadingOverlay(true, 'Loading Helm engine...');
        try {
            // Verifica che il cluster sia raggiungibile prima di procedere.
            // Riutilizziamo lo stesso health check della dashboard K8s.
            await apiCall('/cluster/health');

            // Da qui in poi i 504 operativi faranno redirect (stesso flag della dashboard)
            window._dashboardReady = true;
            renderLoadingOverlay(false);

            // Carica namespace selector e vista iniziale in parallelo
            await Promise.all([
                loadNamespaceList(),
                loadReleases(),
            ]);
        } catch (err) {
            handleLoadingError(
                err.message === 'CLUSTER_UNREACHABLE'
                    ? 'The host may be powered off or the cluster is not responding.'
                    : (err.message || 'Backend not responding.')
            );
        }
    }

    initHelmDashboard();
    </script>

</body>
</html>
