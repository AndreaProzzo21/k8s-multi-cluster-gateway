version: '3.8'

services:
  # --- BACKEND: API GATEWAY (FastAPI) ---
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    image: aprozzo/k8s-gateway-backend:1.0.0
    container_name: k8s_api_gateway_v1
    # La porta 8000 non è più esposta all'esterno (sicurezza!), 
    # ma è accessibile solo dal frontend tramite rete interna.
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - helm_repos:/tmp/helm_repos
    networks:
      - k8s_network
    restart: always

  # --- FRONTEND: REVERSE PROXY (Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aprozzo/k8s-gateway-frontend:1.0.0
    container_name: k8s_frontend_v1
    ports:
      - "80:80" # L'unico punto di ingresso per l'utente
    networks:
      - k8s_network
    restart: always
    depends_on:
      - backend

  # --- TEST SERVICE (Optional) ---
  # Puoi lanciarlo con: docker compose run --rm tester
  tester:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    networks:
      - k8s_network
    env_file:
      - .env
    profiles: ["test"] # Non parte con 'up' normale

networks:
  k8s_network:
    driver: bridge

volumes:
  helm_repos: